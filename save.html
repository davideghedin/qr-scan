<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Presenze</title> 
    
    <link rel="stylesheet" href="style.css">
    <script src="google.js"></script>
    
    <!-- Libreria ufficiale -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="folder-tabs">
        <button class="tab active" onclick="openTab(event, 'scan')">Inserimento</button>
        <button class="tab" onclick="openTab(event, 'data')">Archivio</button>
    </div>

    <div class="folder-body">
        <!-- PAGINA SCANNER -->
        <div id="scan" class="page active">
              <h2>Scansiona QR Code.</h2>
            
              <button id="startBtn">📷 Avvia scansione</button>
            
              <div id="reader"></div>
            
              <div id="result"></div>

              <div id="output"></div>
        </div>

        <!-- PAGINA GOOGLE SHEET -->
        <div id="data" class="page">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRehVbW704F9njWYTtCosZSCsVCorlgevGbm8wsSOU8Z_7kK-1a8MUKFHwcPOxtqpxmipaGj71_r07M/pubhtml?gid=1156890236&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
        </div>
    </div>

    <script>

        function openTab(evt, tabName) {
            // Nascondi tutte le pagine
            const pages = document.getElementsByClassName("page");
            for (let i = 0; i < pages.length; i++) {
                pages[i].classList.remove("active");
            }

            // Disattiva tutte le tab
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            // Mostra la pagina corrente e attiva la tab
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");

            // Gestione logica Scanner
            if (tabName === 'scan') {
                startScanner();
            } else {
                if (scanner) {
                    scanner.stop().catch(e => console.log(e));
                }
            }
        }

//********************************************************************************* 
    const startBtn = document.getElementById("startBtn");
    const readerDiv = document.getElementById("reader");
    const resultDiv = document.getElementById("result");

    let scanner;

    startBtn.addEventListener("click", () => {
      readerDiv.style.display = "block";
      //startBtn.style.display = "none";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" }, // ✅ camera posteriore
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          scanner.stop();

          //readerDiv.style.display = "none";
          resultDiv.innerHTML = `
            <div class="success">✔ QR Code letto</div>
            <div>${decodedText}</div>
          `;
          inviaAGoogleForms(decodedText);          
        }
      ).catch(err => {
        resultDiv.innerText = "Errore fotocamera: " + err;
      });
    });
    
//*********************************************************************************
        
        // Avvio iniziale
        window.onload = startScanner;

        getLastRecord();
        
    </script>
</body>
</html>
