<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Scanner QR Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Libreria ufficiale -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f2f2f7;
      text-align: center;
      padding: 20px;
    }

    #reader {
      width: 100%;
      max-width: 350px;
      margin: auto;
      display: none;
    }

    button {
      margin-top: 20px;
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      word-break: break-all;
    }

    .success {
      color: #34c759;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Scansiona QR Code</h2>

  <button id="startBtn">📷 Avvia scansione</button>

  <div id="reader"></div>

  <div id="result"></div>

  <h2>Presenze salvate</h2>
  <div>
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRehVbW704F9njWYTtCosZSCsVCorlgevGbm8wsSOU8Z_7kK-1a8MUKFHwcPOxtqpxmipaGj71_r07M/pubhtml?gid=1156890236&amp;single=true&amp;widget=true&amp;headers=false"></iframe>    
  </div>

  <script>
    const FORM_ID = "1FAIpQLSeV-QY4T_a2E07ChO0i4emFPICWW8vhhB2T0j5hZGsRa6y8JA";
    const ENTRY_ID = "entry.622568697"; 
    
    const startBtn = document.getElementById("startBtn");
    const readerDiv = document.getElementById("reader");
    const resultDiv = document.getElementById("result");

    let scanner;

    startBtn.addEventListener("click", () => {
      readerDiv.style.display = "block";
      //startBtn.style.display = "none";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" }, // ✅ camera posteriore
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          scanner.stop();

          //readerDiv.style.display = "none";
          resultDiv.innerHTML = `
            <div class="success">✔ QR Code letto</div>
            <div>${decodedText}</div>
          `;
          inviaAGoogleForms(decodedText);          
        }
      ).catch(err => {
        resultDiv.innerText = "Errore fotocamera: " + err;
      });
    });
    
  function inviaAGoogleForms(valoreQR) {
    const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;

    const formData = new FormData();
    formData.append(ENTRY_ID, valoreQR);

    fetch(url, {
      method: "POST",
      mode: "no-cors",
      body: formData
    });

    document.getElementById("status").innerText =
      "QR letto e inviato correttamente ✅";
  }    
  </script>

</body>
</html>
