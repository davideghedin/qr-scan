<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Presenze</title> 
    
    <link rel="stylesheet" href="style.css">
    <script src="google.js"></script>
    
    <!-- Libreria ufficiale -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="folder-tabs">
        <button class="tab active" onclick="openTab(event, 'scan')">Inserimento</button>
        <button class="tab" onclick="openTab(event, 'data')">Archivio</button>
    </div>

    <div class="folder-body">
        <!-- PAGINA SCANNER -->
        <div id="scan" class="page active">
            <h2>Scansiona QR Code</h2>
            
            <button id="startBtn">📷 Avvia scansione</button>
              
            <div id="reader"></div>
            
            <div id="result1"></div>
              
            <h3><center>--OPPURE--</center></h3>
            
            <h2>Cognome e nome</h2>
              <form id="myForm">  
                  <input type="text" id="myInput"></input>
                  <br/>
                  <button type="submit">Salva</button>
              </form>

            <div id="result2"></div>

            <h2>Ultimo inserimento</h2>
            
            <div>
                <span id="output"></span>
                <button id="outputBtn">Carica</button>
            </div>

        </div>

        <!-- PAGINA GOOGLE SHEET -->
        <div id="data" class="page">
            <a href=https://docs.google.com/spreadsheets/d/e/2PACX-1vRehVbW704F9njWYTtCosZSCsVCorlgevGbm8wsSOU8Z_7kK-1a8MUKFHwcPOxtqpxmipaGj71_r07M/pubhtml?gid=1156890236&single=true">Link</a>

            <h2>Dati da Google Sheets</h2>
            <button id="tableBtn">Carica</button>
            <div id="data-table"></div>
    
            <!--
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRehVbW704F9njWYTtCosZSCsVCorlgevGbm8wsSOU8Z_7kK-1a8MUKFHwcPOxtqpxmipaGj71_r07M/pubhtml?gid=1156890236&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
            -->
        </div>
    </div>

    <script>

        function openTab(evt, tabName) {
            // Nascondi tutte le pagine
            const pages = document.getElementsByClassName("page");
            for (let i = 0; i < pages.length; i++) {
                pages[i].classList.remove("active");
            }

            // Disattiva tutte le tab
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            // Mostra la pagina corrente e attiva la tab
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");

            // Gestione logica Scanner
            if (tabName === 'scan') {
                startScanner();
            } else {
                if (scanner) {
                    scanner.stop().catch(e => console.log(e));
                }
            }
        }

//*********************************************************************************     
    const startBtn = document.getElementById("startBtn");
    const outputBtn = document.getElementById("outputBtn");  
    const tableBtn = document.getElementById("tableBtn");      
    const readerDiv = document.getElementById("reader");
    const resultDiv1 = document.getElementById("result1");
    const resultDiv2 = document.getElementById("result2");    
    const outSpan = document.getElementById("output");
    const tableDiv = document.getElementById("data-table");
        
    let scanner;

    startBtn.addEventListener("click", () => {
      readerDiv.style.display = "block";
      //startBtn.style.display = "none";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" }, // ✅ camera posteriore
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          scanner.stop();

          //readerDiv.style.display = "none";
          resultDiv1.innerHTML = `
            <div class="success">✔ QR Code letto</div>
            <div>${decodedText}</div>
          `;
          resultDiv1.innerText = inviaAGoogleForms( decodedText );       
        }
      ).catch(err => {
        resultDiv1.innerText = "Errore fotocamera: " + err;
      });
    });

//*********************************************************************************
    // 1. Riferimenti agli elementi DOM
    const form = document.getElementById('myForm');
    const input = document.getElementById('myInput');
    // 2. Ascoltatore dell'evento submit
    form.addEventListener('submit', function(event) {
        // Impedisce al form di ricaricare la pagina
        event.preventDefault(); 
        // Recupera il valore
        const valoreInput = input.value;
        if (valoreInput && valoreInput.trim() !== "" ) {
            // 3. Lancia la funzione JS
            resultDiv2.innerText = postToGoogleSheet2( valoreInput );
            input.value = "";
        }
    });        

//*********************************************************************************
    outputBtn.addEventListener("click", async () => {
      	
      	outSpan.textContent = "Caricamento...";
      	try {
        	const data = await getLastRow();
        	if (!data) {
          	outSpan.textContent = "Nessuna riga trovata.";
          	return;
        	}
    
        	// Mostro risultato in modo leggibile
        	const asObject = Object.fromEntries(data.headers.map((h, i) => [h, data.values[i]]));
        	outSpan.textContent = JSON.stringify(asObject, null, 2);
      	} catch (e) {
        	outSpan.textContent = `Errore: ${e.message}`;
      	}
    });        

        //*********************************************************************************
    tableBtn.addEventListener("click", async () => {
      	
      	outSpan.textContent = "Caricamento...";
      	try {
        	const data = await getLastRow();
        	if (!data) {
          	tableDiv.textContent = "Nessuna riga trovata.";
          	return;
        	}
    
        	// Mostro risultato in modo leggibile
        	const asObject = Object.fromEntries(data.headers.map((h, i) => [h, data.values[i]]));
        	outSpan.textContent = JSON.stringify(asObject, null, 2);
      	} catch (e) {
        	outSpan.textContent = `Errore: ${e.message}`;
      	}
    });        
//*********************************************************************************
            
        // Avvio iniziale
        window.onload = startScanner;

        //getLastRecord();
        
    </script>
</body>
</html>
