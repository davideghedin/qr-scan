
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Scansione QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    #reader { width: 300px; margin: auto; }
  </style>
</head>
<body>

<h2>Scansiona il QR Code</h2>
<div id="reader"></div>
<p id="status">In attesa della scansione...</p>

<script>
  const FORM_ID = "1FAIpQLSeV-QY4T_a2E07ChO0i4emFPICWW8vhhB2T0j5hZGsRa6y8JA";
  const ENTRY_ID = "entry.622568697"; // cambia con il tuo entry

  function inviaAGoogleForms(valoreQR) {
    const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;

    const formData = new FormData();
    formData.append(ENTRY_ID, valoreQR);

    fetch(url, {
      method: "POST",
      mode: "no-cors",
      body: formData
    });

    document.getElementById("status").innerText =
      "QR letto e inviato correttamente ✅";
  }

  const qrCodeSuccessCallback = (decodedText) => {
    html5QrcodeScanner.clear();
    inviaAGoogleForms(decodedText);
  };

  const html5QrcodeScanner =
    new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  html5QrcodeScanner.render(qrCodeSuccessCallback);
</script>

</body>
</html>
